# PSS/E Simulation Configuration - Dynamic Analysis Example
# This configuration file defines a batch of dynamic simulations with event scripts.
# Compatible with: pssetools sim-runner --config this_file.yml

workspace:
  base_dir: "."

simulations:
  # Step 1: Convert case with custom load models
  - name: "CNV_Caso_Base"
    type: "cnv"
    case: "casos/caso_base.sav"
    options:
      cnv: "build/caso_base.cnv"
      py: "convload.py"

  # Step 2: Build snapshot for transient stability
  - name: "SNP_Snapshot"
    type: "snp"
    case: "casos/caso_base.sav"
    options:
      snp: "build/snapshot.snp"
      dyr: "datos/dinamico.dyr"
      idv: "estudio.idv"
      cc: "build/cc.flx"
      ct: "build/ct.flx"

  # Step 3: Run dynamic simulation - 1-phase fault
  - name: "DYN_Falla_1F"
    type: "dynamic"
    case: "casos/caso_base.sav"
    options:
      cnv: "build/caso_base.cnv"
      snp: "build/snapshot.snp"
      out: "results/dyn_1f.out"
      py: "dyn_1ph.py"

  # Step 4: Run dynamic simulation - 3-phase fault
  - name: "DYN_Falla_3F"
    type: "dynamic"
    case: "casos/caso_base.sav"
    options:
      cnv: "build/caso_base.cnv"
      snp: "build/snapshot.snp"
      out: "results/dyn_3f.out"
      py: "dyn_3ph.py"

execution:
  continue_on_error: false
  logging: "verbose"
  interactive: false
