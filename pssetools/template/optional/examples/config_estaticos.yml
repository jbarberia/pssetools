# Estudios Estáticos - ACCC y ASCC Combinados
# Análisis de contingencias y cortocircuito para múltiples casos operativos
# Uso: pssetools sim-runner --config config_estaticos.yml

workspace:
  base_dir: "."

simulations:
  # ========== CASO BASE ==========
  - name: "ACCC_CasoBase"
    type: "accc"
    case: "casos/caso_base.sav"
    options:
      sub: "estudio.sub"
      mon: "estudio.mon"
      con: "estudio.con"
      dfx: "build/caso_base.dfx"
      acc: "build/caso_base.acc"
      zipfile: "build/caso_base.zip"

  - name: "ASCC_CasoBase"
    type: "ascc"
    case: "casos/caso_base.sav"
    options:
      sub: "estudio.sub"
      asc: "build/caso_base.asc"
      dfx: "build/caso_base_ascc.dfx"
      zipfile: "build/caso_base_ascc.zip"

  # ========== CASO PUNTA ==========
  - name: "ACCC_CasoPunta"
    type: "accc"
    case: "casos/caso_punta.sav"
    options:
      sub: "estudio.sub"
      mon: "estudio.mon"
      con: "estudio.con"
      dfx: "build/caso_punta.dfx"
      acc: "build/caso_punta.acc"
      zipfile: "build/caso_punta.zip"

  - name: "ASCC_CasoPunta"
    type: "ascc"
    case: "casos/caso_punta.sav"
    options:
      sub: "estudio.sub"
      asc: "build/caso_punta.asc"
      dfx: "build/caso_punta_ascc.dfx"
      zipfile: "build/caso_punta_ascc.zip"

  # ========== CASO VALLE ==========
  - name: "ACCC_CasoValle"
    type: "accc"
    case: "casos/caso_valle.sav"
    options:
      sub: "estudio.sub"
      mon: "estudio.mon"
      con: "estudio.con"
      dfx: "build/caso_valle.dfx"
      acc: "build/caso_valle.acc"
      zipfile: "build/caso_valle.zip"

  - name: "ASCC_CasoValle"
    type: "ascc"
    case: "casos/caso_valle.sav"
    options:
      sub: "estudio.sub"
      asc: "build/caso_valle.asc"
      dfx: "build/caso_valle_ascc.dfx"
      zipfile: "build/caso_valle_ascc.zip"

execution:
  # Ejecutar en paralelo: 2 ACCC simultáneamente, seguidos de 2 ASCC
  parallel: 2
  continue_on_error: true
  logging: "normal"
  interactive: false
