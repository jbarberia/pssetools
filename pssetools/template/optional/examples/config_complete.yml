# PSS/E Simulation Configuration - Complete Study Example
# This configuration file runs a complete power system study:
# 1. Static contingency analysis (ACCC)
# 2. Short circuit analysis (ASCC)
# 3. Dynamic transient stability
# Compatible with: pssetools sim-runner --config this_file.yml

workspace:
  base_dir: "."

simulations:
  # ============ STATIC ANALYSIS (ACCC) ============
  - name: "ACCC_DFX_Creation"
    type: "dfx"
    case: "casos/caso_base.sav"
    options:
      sub: "estudio.sub"
      mon: "estudio.mon"
      con: "estudio.con"
      dfx: "build/caso_base.dfx"

  - name: "ACCC_Analysis"
    type: "accc"
    case: "casos/caso_base.sav"
    options:
      dfx: "build/caso_base.dfx"
      acc: "build/caso_base.acc"
      zipfile: "build/caso_base.zip"

  - name: "ACCC_PostProcess"
    type: "acc-pp"
    case: "casos/caso_base.sav"
    options:
      acc: "build/caso_base.acc"
      frp: "results/flujos.frp"
      vrp: "results/voltajes.vrp"

  # ============ SHORT CIRCUIT ANALYSIS (ASCC) ============
  - name: "ASCC_Analysis"
    type: "ascc"
    case: "casos/caso_base.sav"
    options:
      sub: "estudio.sub"
      report: "results/cortocircuito.scf"

  # ============ DYNAMIC SIMULATION ============
  - name: "DYN_CaseConversion"
    type: "cnv"
    case: "casos/caso_base.sav"
    options:
      cnv: "build/caso_base.cnv"
      py: "convload.py"

  - name: "DYN_SnapshotBuild"
    type: "snp"
    case: "casos/caso_base.sav"
    options:
      snp: "build/snapshot.snp"
      dyr: "datos/dinamico.dyr"
      idv: "estudio.idv"
      cc: "build/cc.flx"
      ct: "build/ct.flx"

  - name: "DYN_Simulation_1F"
    type: "dynamic"
    case: "casos/caso_base.sav"
    options:
      cnv: "build/caso_base.cnv"
      snp: "build/snapshot.snp"
      out: "results/dyn_1f.out"
      py: "dyn_1ph.py"

  - name: "DYN_Simulation_3F"
    type: "dynamic"
    case: "casos/caso_base.sav"
    options:
      cnv: "build/caso_base.cnv"
      snp: "build/snapshot.snp"
      out: "results/dyn_3f.out"
      py: "dyn_3ph.py"

execution:
  # Stop on first failure (set to true to continue despite errors)
  continue_on_error: false
  
  # Logging level: "normal", "verbose", "debug"
  logging: "normal"
  
  # Ask for confirmation before each simulation
  interactive: false
  
  # Number of simulations to run in parallel (not implemented yet)
  parallel: 1
