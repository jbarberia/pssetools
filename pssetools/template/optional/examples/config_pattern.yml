# YAML Parametrization Pattern Reference
# This file documents all parametrization techniques available in sim-runner

# ===================================================================
# TECHNIQUE 1: Basic Anchor & Alias
# ===================================================================
# Use: Define a value once, reference it multiple times
# Syntax: &anchor_name at definition, *anchor_name at reference

technique_1: &basic_value "my-value"
reference_1: *basic_value  # Will be "my-value"
reference_2: *basic_value  # Will also be "my-value"

# ===================================================================
# TECHNIQUE 2: Mapping (Object) Anchor with Merge
# ===================================================================
# Use: Share common settings across multiple items
# Syntax: &anchor_name at mapping, <<: *anchor_name to merge into current object

defaults: &default_options
  sub: "common.sub"
  mon: "common.mon"
  con: "common.con"

simulations:
  - name: "Study_1"
    options:
      <<: *default_options
      dfx: "output_1.dfx"
    # Result: Study_1.options has sub, mon, con from defaults, plus dfx

  - name: "Study_2"
    options:
      <<: *default_options
      dfx: "output_2.dfx"
    # Result: Study_2.options inherits all common settings

# ===================================================================
# TECHNIQUE 3: Partial Override
# ===================================================================
# Use: Inherit most settings but override specific ones

common_exec: &exec_defaults
  logging: "normal"
  parallel: 1
  continue_on_error: false

execution_config_1:
  <<: *exec_defaults
  # logging: "normal" (inherited)
  # parallel: 1 (inherited)
  # continue_on_error: false (inherited)

execution_config_2:
  <<: *exec_defaults
  logging: "verbose"  # Override just this
  # parallel: 1 (inherited)
  # continue_on_error: false (inherited)

# ===================================================================
# TECHNIQUE 4: Nested Anchors
# ===================================================================
# Use: Anchors can be nested for complex structures

base_study: &base_study_template
  type: "accc"
  options: &study_options_base
    sub: "studies/base.sub"
    mon: "studies/base.mon"

multi_case:
  - <<: *base_study_template
    name: "Case_A"
    case: "caso_a.sav"
    options:
      <<: *study_options_base
      dfx: "build/a.dfx"

  - <<: *base_study_template
    name: "Case_B"
    case: "caso_b.sav"
    options:
      <<: *study_options_base
      dfx: "build/b.dfx"

# ===================================================================
# TECHNIQUE 5: Multiple Levels of Inheritance
# ===================================================================
# Use: Create inheritance chains for progressive specialization

generic_defaults: &generic
  logging: "normal"

specific_defaults: &specific
  <<: *generic
  parallel: 2

my_config:
  <<: *specific
  continue_on_error: true

# Result:
#   my_config will have:
#   - logging: "normal" (from generic)
#   - parallel: 2 (from specific)
#   - continue_on_error: true (direct)

# ===================================================================
# TECHNIQUE 6: List Anchors (Less Common)
# ===================================================================
# Use: Reuse lists of values
# Note: Less useful for configs, but possible

common_files: &files_list
  - "file1.txt"
  - "file2.txt"

config_a:
  inputs: *files_list  # [file1.txt, file2.txt]

config_b:
  inputs: *files_list  # Same files

# ===================================================================
# PATTERN: Real-World Multi-Case ACCC
# ===================================================================
# This is what you'd typically do for multiple cases

workspace: &ws
  base_dir: "."

accc_defaults: &accc
  type: "accc"
  options: &accc_opts
    sub: "std/accc.sub"
    mon: "std/accc.mon"
    con: "std/accc.con"

exec_normal: &exec_normal
  continue_on_error: false
  logging: "normal"

my_study:
  <<: *ws
  simulations:
    - name: "ACCC_Caso_01"
      <<: *accc
      case: "casos/caso_01.sav"
      options:
        <<: *accc_opts
        dfx: "build/caso_01.dfx"
    
    - name: "ACCC_Caso_02"
      <<: *accc
      case: "casos/caso_02.sav"
      options:
        <<: *accc_opts
        dfx: "build/caso_02.dfx"
    
    - name: "ACCC_Caso_03"
      <<: *accc
      case: "casos/caso_03.sav"
      options:
        <<: *accc_opts
        dfx: "build/caso_03.dfx"
  
  execution: *exec_normal

# ===================================================================
# WHEN TO USE EACH TECHNIQUE
# ===================================================================
#
# Technique 1 (Basic Anchor & Alias):
# - Simple string/number values repeated in config
# - Example: paths that appear multiple times
#
# Technique 2 (Mapping with Merge):
# - Your most common use case!
# - Common settings shared across studies
# - Example: ACCC options used by 5 different cases
#
# Technique 3 (Partial Override):
# - Most variations on a theme
# - Example: All cases use same config except one has verbose logging
#
# Technique 4-5 (Nested & Inheritance Chains):
# - Complex hierarchies of settings
# - Example: Generic defaults → study type defaults → specific case overrides
#
# ===================================================================
# WHEN NOT TO USE ANCHORS
# ===================================================================
#
# Don't use anchors if:
# - You're only repeating something once
# - Each case is completely different (consider separate config files)
# - Config is already < 100 lines (easier to read without anchors)
#
# Instead use config_generator.py if:
# - You have 50+ similar cases
# - Need to generate from a template programmatically
# - Want variable substitution ({{CASE_NAME}}, {{CASE_FILE}}, etc.)
#
# ===================================================================
