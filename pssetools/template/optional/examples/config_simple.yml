# Plantilla Mínima Lista para Usar
# Copia este archivo a tu proyecto y personaliza las rutas
# Uso: pssetools sim-runner --config config.yml

workspace:
  base_dir: "."

simulations:
  - name: "ACCC_EstudioPrincipal"
    type: "accc"
    case: "casos/mi_caso.sav"
    options:
      sub: "estudio.sub"
      mon: "estudio.mon"
      con: "estudio.con"
      dfx: "build/resultado.dfx"
      acc: "build/resultado.acc"
      zipfile: "build/resultado.zip"

  - name: "ASCC_EstudioPrincipal"
    type: "ascc"
    case: "casos/mi_caso.sav"
    options:
      sub: "estudio.sub"
      asc: "build/resultado.asc"

execution:
  parallel: 1
  continue_on_error: false
  logging: "normal"
