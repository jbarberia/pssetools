# Template for ACCC batch generation
# Variables to replace: Caso_03_Punta, caso_03_peak.sav, build, accc_punta.sub, accc.mon, accc.con
# 
# Usage:
#   python generate_config.py --template accc_sweep.yml --variables variables.json --output ./configs
#
# This will generate config_Caso_03_Punta.yml for each case in variables.json

workspace:
  base_dir: "."
  create_dirs: true

simulations:
  - name: "ACCC_Caso_03_Punta"
    type: "accc"
    case: "casos/caso_03_peak.sav"
    options:
      sub: "estudios/accc_punta.sub"
      mon: "estudios/accc.mon"
      con: "estudios/accc.con"
      dfx: "build/accc_Caso_03_Punta.dfx"

execution:
  continue_on_error: false
  logging: "normal"
  parallel: 1
