# Template for ACCC batch generation
# Variables to replace: Caso_01_Base, caso_01_base.sav, build, accc_base.sub, accc.mon, accc.con
# 
# Usage:
#   python generate_config.py --template accc_sweep.yml --variables variables.json --output ./configs
#
# This will generate config_Caso_01_Base.yml for each case in variables.json

workspace:
  base_dir: "."
  create_dirs: true

simulations:
  - name: "ACCC_Caso_01_Base"
    type: "accc"
    case: "casos/caso_01_base.sav"
    options:
      sub: "estudios/accc_base.sub"
      mon: "estudios/accc.mon"
      con: "estudios/accc.con"
      dfx: "build/accc_Caso_01_Base.dfx"

execution:
  continue_on_error: false
  logging: "normal"
  parallel: 1
