# Complete Example: Simple Configuration Format
# ==================================================
# This example shows all three study types (ACCC, ASCC, Dinamico)
# working together in a single configuration file.

workspace:
  base_dir: "."

# ========== AC CONTINGENCY ANALYSIS (ACCC) ==========
# Runs contingency analysis on each SAV case
# Generates N simulations (one per SAV file)
accc:
  sav:
    - "inv24va.sav"
    - "ver2425pid.sav"
  
  sub: "estudio.sub"        # Contingency list
  con: "estudio.con"        # Contingency output format
  mon: "estudio.mon"        # Monitor output format

# ========== AC SMALL SIGNAL ANALYSIS (ASCC) =========
# Eigenvalue analysis for system stability
# Generates M simulations (one per SAV file)
ascc:
  sav:
    - "inv24va.sav"
  
  sub: "estudio.sub"        # Setup/switching commands

# ========== DYNAMIC SIMULATION (DINAMICO) ===========
# Transient stability analysis
# For N SAV files and M Python scripts:
# Generates N × M × 3 simulations
# (CNV→SNP→DYN for each (sav, py) combination)
dinamico:
  sav:
    - "inv24va.sav"
    - "ver2425pid.sav"
  
  py:
    - "flat1.py"
    - "flat2.py"

# ============ EXECUTION OPTIONS ===============
execution:
  parallel_jobs: 2          # Use 2 parallel workers
  continue_on_error: false  # Stop on first failure
  logging:
    level: "normal"         # "quiet", "normal", or "verbose"
    format: "text"

# ============ OUTPUT DIRECTORIES ===============
output:
  results_dir: "results"    # Where to save results
  logs_dir: "logs"          # Where to save log files
  build_dir: "build"        # Temporary build files

# ============== STATISTICS ====================
# Total simulations generated:
#   - ACCC: 2 (one per SAV)
#   - ASCC: 1 (one per SAV)
#   - Dinamico: 12 (2 SAV × 2 scripts × 3 phases)
#   - TOTAL: 15 simulations
#
# With parallel_jobs: 2, these will be distributed
# across 2 workers for concurrent execution.
