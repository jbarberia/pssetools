# Simplified Configuration Format
# ===============================================
# This is the new simple format that groups simulations by study type.
# Each group expands to multiple simulations automatically.

workspace:
  base_dir: "."

accc:
  # List of SAV files for ACCC study (AC Contingency)
  sav:
    - "inv24va.sav"
    - "ver2425pid.sav"
  
  # Shared files for ACCC
  sub: "estudio.sub"
  con: "estudio.con"
  mon: "estudio.mon"

ascc:
  # List of SAV files for ASCC study (AC Small Signal)
  sav:
    - "inv24va.sav"
  
  # Shared files for ASCC
  sub: "estudio.sub"

# dinamico:
#   # List of SAV files for dynamic simulations
#   sav:
#     - "inv24va.sav"
#     - "ver2425pid.sav"
#   
#   # List of Python control scripts
#   # Each (sav, py) combination generates 3 simulations: CNV → SNP → DYN
#   py:
#     - "flat1.py"
#     - "flat2.py"

execution:
  parallel_jobs: 1
  continue_on_error: false
  logging:
    level: "normal"
    format: "text"

output:
  results_dir: "results"
  logs_dir: "logs"
  build_dir: "build"
